name: Deploy EverEsports Server

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test
    
    - name: Run linting
      run: npm run lint

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Create build directory
      run: mkdir -p dist
    
    - name: Copy server files
      run: |
        cp -r config dist/
        cp -r middleware dist/
        cp -r utils dist/
        cp -r uploads dist/
        cp server.js dist/
        cp package.json dist/
        cp env.example dist/
        cp README.md dist/
    
    - name: Create production .env
      run: |
        cp env.example dist/.env
        echo "NODE_ENV=production" >> dist/.env
        echo "PORT=3000" >> dist/.env
        echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> dist/.env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> dist/.env
        echo "CORS_ORIGIN=https://kavimarkstar.github.io" >> dist/.env
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: server-build
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: server-build
        path: dist/
    
    - name: Deploy to server
      run: |
        echo "Deploying to production server..."
        # Add your deployment commands here
        # Example for Vercel, Netlify, or other hosting services
        # npm install -g vercel
        # vercel --prod --token ${{ secrets.VERCEL_TOKEN }} 