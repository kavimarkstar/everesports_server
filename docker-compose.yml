version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/everesports
      - MONGODB_DB_NAME=everesports
      - JWT_SECRET=your-super-secret-jwt-key-here
      - ENABLE_IMAGE_OPTIMIZATION=true
      - ENABLE_VIDEO_PROCESSING=true
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - everesports-network

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=everesports
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - everesports-network

  mongo-express:
    image: mongo-express:1.0.0
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=password
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - everesports-network

volumes:
  mongo_data:

networks:
  everesports-network:
    driver: bridge 