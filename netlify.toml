[build]
  command = "npm install"
  publish = "."

[build.environment]
  NODE_ENV = "production"
  PORT = "3000"

[[redirects]]
  from = "/*"
  to = "/server.js"
  status = 200

[functions]
  directory = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin" 